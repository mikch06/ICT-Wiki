    <h2>Resize Disk Space on Solaris</h2>
    <div class="published">&#128198; published: 31.08.2015</div>
    <div class="modified">&#128198; modified:</div>
    <div class="tags">&#128204; Solaris11, Unix, zfs</div>
    <hr>
<pre>format -e
# growfs -M /mount-point /dev/md/rdsk/volumename
# growfs -M /home2 /dev/md/rdsk/d10
zfs set volsize=5G rpool/swap
swap -a /dev/zvol/dsk/rpool/swap</pre>
