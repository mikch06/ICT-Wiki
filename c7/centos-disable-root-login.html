    <h2>Disable root login</h2>
    <div class="published">&#128198; published: 23.12.2015</div>
    <div class="modified">&#128198; modified: 27.04.2020</div>
    <div class="tags">&#128204; centos, linux, ict</div>
    <hr>
    To disallow direct 'root' login on a CentOS Machine:

    <pre>vi /etc/ssh/sshd_config
PermitRootLogin no</pre>

</body>
