    <h2>Disable ipv6 on CentOS8</h2>
    <div class="published">&#128198; published: 03.06.2020</div>
    <div class="modified">&#128198; modified: 03.06.2020</div>
    <div class="tags">&#128204; centos, linux, ipv6</div>
    <hr>

    Disable ipv6 on CentOS8:
<pre># vi /etc/sysctl.conf

net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1

sysctl -p
</pre>
</body>
